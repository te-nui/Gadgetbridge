name: Build S5 debug APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build debug APK
        run: ./gradlew assembleMainlineDebug --stacktrace || ./gradlew assembleDebug --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: gadgetbridge-s5-debug-apk
          path: app/build/outputs/apk/**/*.apk
